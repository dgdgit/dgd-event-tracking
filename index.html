<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DGD - Tra cứu thưởng Tiền tươi về ví</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .spinner { border-top-color: #ea580c; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-800">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <div class="text-center mb-10">
            <img src="https://media.dgd.vn/assets/settings/6a42db0d-2181-4fc7-b17f-f3f08b445ac2.png" alt="Logo DGD" class="h-16 mx-auto mb-4 object-contain">
            <h1 class="text-3xl md:text-4xl font-bold text-slate-900 mb-2">🎉 Tra Cứu Trả Thưởng DGD</h1>
            <p class="text-slate-500">Chương trình "Đấu giá miễn phí – Tiền tươi về ví"</p>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-slate-100 mb-6 gap-4">
            <input type="text" id="searchInput" placeholder="🔍 Nhập ID DGD để tìm..." class="w-full md:w-1/3 px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500">
            
            <select id="statusFilter" class="w-full md:w-1/4 px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-orange-500">
                <option value="all">Tất cả trạng thái</option>
                <option value="Đã chuyển 100k">Đã chuyển 100k</option>
                <option value="Đang xử lý">Đang xử lý</option>
            </select>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-sm uppercase tracking-wider text-slate-500">
                            <th class="p-4 font-semibold">STT</th>
                            <th class="p-4 font-semibold">ID Giao Dịch</th>
                            <th class="p-4 font-semibold">Tên Chủ TK</th>
                            <th class="p-4 font-semibold">Ngân Hàng</th>
                            <th class="p-4 font-semibold">Số Tài Khoản</th>
                            <th class="p-4 font-semibold text-center">Tình Trạng</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100 text-sm">
                        </tbody>
                </table>
            </div>
            
            <div id="loading" class="flex flex-col items-center justify-center py-12">
                <div class="w-10 h-10 border-4 border-orange-200 border-t-orange-600 rounded-full spinner mb-3"></div>
                <p class="text-slate-500">Đang lấy dữ liệu từ hệ thống DGD...</p>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // ⚠️ BẠN HÃY DÁN CÁI LINK API CỦA BẠN VÀO ĐÂY
        // ==========================================
        const API_URL = "https://script.google.com/macros/s/AKfycbx5Ez7mWUZ0x55UWElGim4QADI6_nOhzN2CTOhgXWmBPTGv4GZ-DXTxI8F-5zrg3QwbgA/exec";

        let allData = [];

        // Hàm gọi dữ liệu
        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                const json = await response.json();
                
                if(json.status === "success") {
                    allData = json.data;
                    document.getElementById('loading').style.display = 'none';
                    renderTable(allData);
                } else {
                    alert("Lỗi tải dữ liệu: " + json.error);
                }
            } catch (error) {
                console.error("Lỗi:", error);
                document.getElementById('loading').innerHTML = `<p class="text-red-500 font-semibold">Lỗi kết nối đến máy chủ. Vui lòng thử lại sau.</p>`;
            }
        }

        // Hàm hiển thị dữ liệu ra bảng
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = "";

            if(data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-6 text-center text-slate-500">Không tìm thấy dữ liệu phù hợp.</td></tr>`;
                return;
            }

            data.forEach((item, index) => {
                // Tạo nhãn màu sắc cho trạng thái trả thưởng
                let statusBadge = item.da_tra_thuong === "Đã chuyển 100k" 
                    ? `<span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-xs font-bold flex items-center justify-center gap-1">✅ 100k Đã Về Ví</span>`
                    : `<span class="bg-amber-100 text-amber-700 px-3 py-1 rounded-full text-xs font-bold flex items-center justify-center gap-1">⏳ Đang xử lý</span>`;

                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors";
                tr.innerHTML = `
                    <td class="p-4 text-slate-500">${index + 1}</td>
                    <td class="p-4 font-semibold text-orange-600">${item.id_giao_dich}</td>
                    <td class="p-4">${item.ten_chu_tk}</td>
                    <td class="p-4"><span class="bg-slate-100 px-2 py-1 rounded text-xs text-slate-600 font-medium">${item.ten_ngan_hang}</span></td>
                    <td class="p-4 font-mono text-slate-600">${item.so_tai_khoan}</td>
                    <td class="p-4 text-center">${statusBadge}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // --- CÁC HÀM TÌM KIẾM VÀ LỌC ---
        document.getElementById('searchInput').addEventListener('input', filterData);
        document.getElementById('statusFilter').addEventListener('change', filterData);

        function filterData() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;

            const filteredData = allData.filter(item => {
                const matchSearch = item.id_giao_dich.toLowerCase().includes(searchTerm);
                const matchStatus = statusFilter === "all" || item.da_tra_thuong === statusFilter;
                return matchSearch && matchStatus;
            });

            renderTable(filteredData);
        }

        // Chạy ngay khi mở web
        fetchData();
    </script>
</body>
</html>
